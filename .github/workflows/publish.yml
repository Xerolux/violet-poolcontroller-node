name: Publish npm package

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.repository == 'Xerolux/violet-poolcontroller-node'
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v7
      - uses: actions/checkout@v7
        with:
          repository: Xerolux/violet-poolController-api
          ref: main
          path: upstream
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Install npm with OIDC support
        run: npm install --global npm@12.0.1
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build
      - run: npm run parity:check -- --upstream-dir upstream
      - run: npm pack --dry-run
      - name: Verify tag matches package version
        shell: bash
        run: test "v$(node -p "require('./package.json').version")" = "${GITHUB_REF_NAME}"
      - name: Publish to npm
        run: npm publish
